<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Scholarch | Academic Research Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/archive.css">
  <link rel="icon" href="../images/icon.ico" type="image/png">
</head>
<body>

<header class="mobile-topbar">
  <a href="#" class="mobile-logo">
    <svg viewBox="0 0 22 22" fill="none">
      <circle cx="9" cy="9" r="6.5" stroke="#436DE9" stroke-width="1.8" />
      <line x1="14" y1="14" x2="20" y2="20" stroke="#436DE9" stroke-width="1.8" stroke-linecap="round" />
      <line x1="6.5" y1="9" x2="11.5" y2="9" stroke="#c8a800" stroke-width="1.6" stroke-linecap="round" />
      <line x1="9" y1="6.5" x2="9" y2="11.5" stroke="#c8a800" stroke-width="1.6" stroke-linecap="round" />
    </svg>
    <span class="mobile-logo-text">Scholar<span class="ch">ch</span></span>
  </a>
  <div class="mobile-topbar-right">
    <button class="btn-notif">
      <svg viewBox="0 0 18 18" fill="none">
        <path d="M9 1.5A5.5 5.5 0 0 0 3.5 7v3.5L2 12h14l-1.5-1.5V7A5.5 5.5 0 0 0 9 1.5Z" stroke="currentColor" stroke-width="1.4" />
        <path d="M7 12.5a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
      </svg>
      <span class="notif-badge"></span>
    </button>
    <button class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<nav class="mobile-nav" id="mobile-nav">
  <ul class="mobile-nav-links">
    <li><a href="#" id="mobileDashboardLink">Dashboard</a></li>   
    <li><a href="#" class="mobile-nav-active" id="mobileArchiveLink">Browse Archive</a></li>
    <li><a href="#" id="mobileProfileLink">Profile</a></li>      
  </ul>
  <div class="mobile-nav-auth" id="mobileAuth"></div>
</nav>

<div class="mobile-content">
  <main class="mobile-main" id="mobile-root"></main>
</div>

<div class="grid-container">
  <aside class="sidebar">
    <a href="#" class="sidebar-logo">
      <svg viewBox="0 0 22 22" fill="none">
        <circle cx="9" cy="9" r="6.5" stroke="#436DE9" stroke-width="1.8" />
        <line x1="14" y1="14" x2="20" y2="20" stroke="#436DE9" stroke-width="1.8" stroke-linecap="round" />
        <line x1="6.5" y1="9" x2="11.5" y2="9" stroke="#c8a800" stroke-width="1.6" stroke-linecap="round" />
        <line x1="9" y1="6.5" x2="9" y2="11.5" stroke="#c8a800" stroke-width="1.6" stroke-linecap="round" />
      </svg>
      <span class="logo-text">Scholar<span class="ch">ch</span></span>
    </a>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Overview</span>
      <a href="#" class="nav-item" id="dashboardLink">
        <svg viewBox="0 0 16 16" fill="none">
          <rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4" />
          <rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4" />
          <rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4" />
          <rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4" />
        </svg>
        Dashboard
      </a>
      <span class="nav-section-label">Research</span>
      <a href="#" class="nav-item is-active" id="dashboardLink">
        <svg viewBox="0 0 16 16" fill="none">
          <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.4" />
          <line x1="11" y1="11" x2="15" y2="15" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
        Browse Archive
      </a>
      <span class="nav-section-label">Account</span>
      <a href="#" class="nav-item" id="profileLink">
        <svg viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="5.5" r="3" stroke="currentColor" stroke-width="1.4" />
          <path d="M2 14c0-3 2.7-4.5 6-4.5s6 1.5 6 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
        Profile
      </a>
    </nav>
    <div class="sidebar-footer" id="authSection"></div>
  </aside>

  <div class="right-column">
    <header class="topbar">
      <div class="topbar-left"></div>
      <div class="topbar-right" id="topbarAuth"></div>
    </header>
    <main class="main-content" id="desktop-root"></main>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-brand">
    <span class="logo-text">Scholar<span class="ch">ch</span></span>
    <span>PLV ITD · 2026</span>
  </div>
  <nav class="footer-links"><a href="#">Privacy</a><a href="#">Terms</a><a href="#">Support</a></nav>
</footer>
<script src="../js/util.js"></script>
<script src="../js/archive.js"></script>
</body>
</html>
